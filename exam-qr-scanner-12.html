<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QR → CSV</title>
<!--
  jsQR 1.4.0 — pure-JS QR decoder, no native API needed.
  SRI hash ensures supply-chain integrity.
  onJsQRLoadFail must be defined BEFORE this tag so onerror can call it.
-->
<script>
function onJsQRLoadFail() {
  // May fire before DOM is ready — defer if so
  function _fail() {
    document.querySelectorAll('.tab').forEach((b, i) => {
      if (i < 2) { b.disabled = true; b.style.opacity = '0.4'; b.title = 'Requires internet for first load'; }
    });
    if (typeof switchTab === 'function') switchTab('paste');
    if (typeof showToast === 'function') showToast('jsQR failed to load — use Paste tab. Check connection and reload.', 'err');
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _fail);
  } else {
    _fail();
  }
}
</script>
<script
  src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
  onerror="onJsQRLoadFail()">
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#08090b;--surf:#111318;--surf2:#181b22;--border:#1f2330;
    --accent:#f0c040;--green:#3ddc84;--red:#ff5555;--blue:#4fa3ff;
    --text:#dde1ec;--muted:#4a5068;
  }
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100vh;padding:22px 16px 80px}

  .hdr{text-align:center;margin-bottom:20px}
  .hdr h1{font-size:clamp(1.5rem,5vw,2rem);font-weight:800;letter-spacing:-.03em;color:var(--accent)}
  .hdr p{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:5px}

  .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:14px}

  .card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:18px}
  .clabel{font-family:'JetBrains Mono',monospace;font-size:.62rem;text-transform:uppercase;
    letter-spacing:.14em;color:var(--muted);margin-bottom:11px}

  /* tabs */
  .tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
  .tab{flex:1;padding:9px 4px;font-family:'JetBrains Mono',monospace;font-size:.7rem;
    font-weight:600;border:none;cursor:pointer;background:transparent;
    color:var(--muted);transition:all .15s;letter-spacing:.02em}
  .tab.active{background:var(--accent);color:#08090b}

  /* camera */
  .cam-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:10px;
    overflow:hidden;background:#000;border:1px solid var(--border)}
  #video{width:100%;height:100%;object-fit:cover;display:block}
  #canvas{display:none}

  .scan-line{position:absolute;left:8%;right:8%;height:2px;
    background:var(--accent);box-shadow:0 0 10px var(--accent),0 0 26px var(--accent);
    animation:scanmove 2s ease-in-out infinite;display:none;z-index:4}
  @keyframes scanmove{0%{top:10%}50%{top:88%}100%{top:10%}}

  .br{position:absolute;inset:0;pointer-events:none;z-index:3;display:none}
  .br span{position:absolute;width:26px;height:26px;border-color:var(--accent);border-style:solid}
  .br span:nth-child(1){top:8px;left:8px;border-width:3px 0 0 3px}
  .br span:nth-child(2){top:8px;right:8px;border-width:3px 3px 0 0}
  .br span:nth-child(3){bottom:8px;left:8px;border-width:0 0 3px 3px}
  .br span:nth-child(4){bottom:8px;right:8px;border-width:0 3px 3px 0}

  .flash{position:absolute;inset:0;border-radius:10px;
    background:rgba(240,192,64,.45);opacity:0;pointer-events:none;z-index:10;transition:opacity .06s}
  .flash.on{opacity:1}

  .cam-idle{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;color:var(--muted);
    font-family:'JetBrains Mono',monospace;font-size:.78rem}
  .cam-idle svg{opacity:.25}

  #dbg{font-family:'JetBrains Mono',monospace;font-size:.62rem;
    color:var(--muted);margin-top:6px;min-height:14px;text-align:center;word-break:break-all}

  /* buttons */
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  button{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:600;
    padding:9px 18px;border-radius:8px;border:none;cursor:pointer;
    transition:all .15s;letter-spacing:.02em;white-space:nowrap}
  .btn-y{background:var(--accent);color:#08090b}
  .btn-y:hover{filter:brightness(1.15);transform:translateY(-1px)}
  .btn-g{background:var(--green);color:#08090b}
  .btn-g:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .btn-b{background:var(--blue);color:#08090b}
  .btn-b:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,85,85,.3);font-size:.72rem;padding:7px 13px}
  .btn-danger:hover{background:rgba(255,85,85,.08)}
  .btn-sm{padding:6px 12px;font-size:.72rem}
  .ml{margin-left:auto}
  button:disabled{opacity:.35;pointer-events:none}
  #stopBtn{display:none}

  /* toast */
  .toast{font-family:'JetBrains Mono',monospace;font-size:.72rem;
    padding:9px 13px;border-radius:8px;display:none}
  .toast.ok {background:rgba(61,220,132,.1);color:var(--green);border:1px solid rgba(61,220,132,.25);display:block}
  .toast.err{background:rgba(255,85,85,.1);color:var(--red);border:1px solid rgba(255,85,85,.25);display:block}
  .toast.inf{background:rgba(79,163,255,.1);color:var(--blue);border:1px solid rgba(79,163,255,.25);display:block}

  /* photo tab */
  #fileInput{display:none}
  .file-drop{border:2px dashed var(--border);border-radius:10px;padding:30px;
    text-align:center;font-family:'JetBrains Mono',monospace;font-size:.74rem;
    color:var(--muted);cursor:pointer;transition:border-color .2s}
  .file-drop:hover,.file-drop.drag{border-color:var(--accent);color:var(--accent)}
  #imgPreview{width:100%;border-radius:8px;margin-top:10px;display:none;max-height:220px;object-fit:contain}
  #photoCanvas{display:none}

  /* paste */
  textarea{width:100%;background:var(--surf2);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;
    font-size:.76rem;padding:12px;resize:vertical;min-height:95px;
    outline:none;transition:border-color .2s;line-height:1.6}
  textarea:focus{border-color:var(--accent)}
  textarea::placeholder{color:var(--muted)}

  /* pool */
  .pool-hdr{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .pool-hdr .clabel{margin-bottom:0}
  .badge{font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:3px 10px;border-radius:20px}
  .bdg-g{background:rgba(61,220,132,.1);color:var(--green);border:1px solid rgba(61,220,132,.2)}

  .tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:.73rem;font-family:'JetBrains Mono',monospace}
  thead tr{background:rgba(240,192,64,.05);border-bottom:1px solid var(--border)}
  thead th{padding:7px 10px;text-align:left;font-size:.59rem;text-transform:uppercase;
    letter-spacing:.1em;color:var(--accent);white-space:nowrap}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  tbody td{padding:7px 10px;color:var(--text);white-space:nowrap}
  .xbtn{background:none;border:none;color:var(--muted);cursor:pointer;
    font-size:.8rem;padding:2px 6px;border-radius:4px}
  .xbtn:hover{color:var(--red);background:rgba(255,85,85,.1)}
  .empty{text-align:center;padding:26px;color:var(--muted);
    font-family:'JetBrains Mono',monospace;font-size:.73rem;line-height:1.9}

  .csv-pre{background:var(--surf2);border:1px solid var(--border);border-radius:8px;
    padding:11px;font-family:'JetBrains Mono',monospace;font-size:.68rem;
    color:var(--muted);white-space:pre;overflow-x:auto;
    max-height:110px;overflow-y:auto;line-height:1.7;margin-top:12px}
</style>
</head>
<body>

<div class="hdr">
  <h1>QR → CSV</h1>
  <p>scan · save · export</p>
</div>

<div class="wrap">

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('camera')">📷 Camera</button>
      <button class="tab" onclick="switchTab('photo')">🖼 Photo</button>
      <button class="tab" onclick="switchTab('paste')">📋 Paste</button>
    </div>

    <!-- CAMERA TAB -->
    <div id="tabCamera">
      <div class="cam-wrap">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas"></canvas>
        <div class="scan-line" id="scanLine"></div>
        <div class="br" id="br"><span></span><span></span><span></span><span></span></div>
        <div class="flash" id="flash"></div>
        <div class="cam-idle" id="camIdle">
          <svg width="42" height="42" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
            <path d="M3 9V6a1 1 0 0 1 1-1h3M3 15v3a1 1 0 0 0 1 1h3M21 9V6a1 1 0 0 0-1-1h-3M21 15v3a1 1 0 0 1-1 1h-3"/>
            <rect x="7" y="7" width="4" height="4" rx="0.5"/>
            <rect x="13" y="7" width="4" height="4" rx="0.5"/>
            <rect x="7" y="13" width="4" height="4" rx="0.5"/>
          </svg>
          <span>tap Start Camera</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
        <div id="dbg" style="font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);word-break:break-all">—</div>
        <span class="badge bdg-g" id="camPoolCount" style="white-space:nowrap;flex-shrink:0;margin-left:8px">0 saved</span>
      </div>
      <div class="btn-row">
        <button class="btn-y" id="startBtn" onclick="startCamera()">Start Camera</button>
        <button class="btn-ghost" id="stopBtn" onclick="stopCamera()">Stop</button>
      </div>
    </div>

    <!-- PHOTO TAB -->
    <div id="tabPhoto" style="display:none">
      <div class="file-drop" id="fileDrop"
        onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="onDrop(event)">
        📁 tap to choose QR photo
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="onFileSelect(event)">
      <img id="imgPreview" alt="">
      <canvas id="photoCanvas"></canvas>
    </div>

    <!-- PASTE TAB -->
    <div id="tabPaste" style="display:none">
      <textarea id="pasteBox" placeholder='{"Name":"...","SeatNo":"...","SID":"...","SchoolIndexNo":"..."}
Paste one or multiple records'></textarea>
      <div class="btn-row">
        <button class="btn-g" onclick="parsePaste()">Parse &amp; Save</button>
        <button class="btn-ghost btn-sm" onclick="document.getElementById('pasteBox').value=''">Clear</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- POOL -->
  <div class="card">
    <div class="pool-hdr">
      <div class="clabel">Saved Pool</div>
      <span class="badge bdg-g" id="poolBadge">0 records</span>
      <div class="ml" style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-b" onclick="exportCSV()">&#x2193; Export CSV</button>
        <button class="btn-danger btn-sm" onclick="clearPool()">Clear All</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>School Index</th><th>Seat No</th><th>SID No</th><th>Name</th><th></th></tr>
        </thead>
        <tbody id="poolBody">
          <tr><td colspan="6"><div class="empty">// pool is empty<br>scan · photo · paste</div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="clabel" style="margin-top:13px">CSV Preview</div>
    <div class="csv-pre" id="csvBox">—</div>
  </div>

</div>

<script>
'use strict';

// ══ IndexedDB ════════════════════════════════════════════════════════════════
const DB_NAME = 'ExamQR_v4', STORE = 'records';
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      if (!e.target.result.objectStoreNames.contains(STORE))
        e.target.result.createObjectStore(STORE, { keyPath:'id', autoIncrement:true });
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror   = e => rej(e.target.error);
  });
}

const dbAll  = () => new Promise((r,j) => {
  const q = db.transaction(STORE,'readonly').objectStore(STORE).getAll();
  q.onsuccess = () => r(q.result); q.onerror = j;
});
const dbAdd  = row => new Promise((r,j) => {
  const tx = db.transaction(STORE,'readwrite');
  tx.objectStore(STORE).add(row);
  tx.oncomplete = r; tx.onerror = j;
});
const dbMany = rows => new Promise((r,j) => {
  const tx = db.transaction(STORE,'readwrite');
  const s  = tx.objectStore(STORE);
  rows.forEach(x => s.add(x));
  tx.oncomplete = r; tx.onerror = j;
});
const dbDel  = id => new Promise((r,j) => {
  const tx = db.transaction(STORE,'readwrite');
  tx.objectStore(STORE).delete(id);
  tx.oncomplete = r; tx.onerror = j;
});
const dbClr  = () => new Promise((r,j) => {
  const tx = db.transaction(STORE,'readwrite');
  tx.objectStore(STORE).clear();
  tx.oncomplete = r; tx.onerror = j;
});

// ══ App state ════════════════════════════════════════════════════════════════
let pool        = [];
let scanning    = false;
let isProcessing = false;   // FIX [HIGH-2]: guard against concurrent onCode() calls
let videoStream = null;
let rafId       = null;
let lastCode    = '';
let lastAt      = 0;
const COOLDOWN  = 3000;     // ms — minimum gap before same QR can be saved again

// ══ Boot ═════════════════════════════════════════════════════════════════════
openDB()
  .then(dbAll)
  .then(rows => { pool = rows; renderPool(); })
  .catch(e => showToast('DB error: ' + e.message, 'err'));

// ══ Page Visibility — stop camera when phone locked / app switched ════════════
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // App backgrounded — stop stream to save battery and release camera
    if (scanning) { stopCamera(); _wasScanning = true; }
  } else {
    // App foregrounded — restart if it was running before
    if (_wasScanning) { _wasScanning = false; startCamera(); }
  }
});
let _wasScanning = false;

// ══ Tab switching ═════════════════════════════════════════════════════════════
function switchTab(name) {
  ['Camera','Photo','Paste'].forEach(t => {
    document.getElementById('tab' + t).style.display = (t.toLowerCase() === name) ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((b, i) => {
    b.classList.toggle('active', ['camera','photo','paste'][i] === name);
  });
  if (name !== 'camera') {
    stopCamera();
    dbg('—'); // clear stale camera message when on other tabs
  }
}

// ══ Camera ═══════════════════════════════════════════════════════════════════
async function startCamera() {
  if (typeof jsQR !== 'function') {
    showToast('jsQR not loaded — check internet and reload page', 'err'); return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('Camera API not available in this browser', 'err'); return;
  }

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal:'environment' }, width: { ideal:1280 }, height: { ideal:1280 } }
    });
  } catch(e) {
    showToast('Camera denied — check browser permissions', 'err');
    dbg('ERROR: ' + e.name + ': ' + e.message);
    return;
  }

  const video = document.getElementById('video');
  video.srcObject = videoStream;
  try { await video.play(); } catch(e) { /* autoplay policy — playsinline handles it */ }

  scanning = true;
  isProcessing = false;

  document.getElementById('camIdle').style.display  = 'none';
  document.getElementById('scanLine').style.display = 'block';
  document.getElementById('br').style.display       = 'block';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display  = 'inline-block';

  showToast('Camera active — point at QR code', 'inf');
  dbg('Scanning with jsQR…');
  tick();
}

function stopCamera() {
  scanning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }

  const video = document.getElementById('video');
  video.srcObject = null;

  document.getElementById('camIdle').style.display  = 'flex';
  document.getElementById('scanLine').style.display = 'none';
  document.getElementById('br').style.display       = 'none';
  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').style.display  = 'none';
  dbg('Camera stopped');
}

// ══ Scan loop ════════════════════════════════════════════════════════════════
// FIX [HIGH-1]: tick() is now async and awaits onCode().
// FIX [HIGH-2]: isProcessing guard prevents concurrent DB writes.
async function tick() {
  if (!scanning) return;

  // Skip frame if a previous onCode() is still writing to DB
  if (!isProcessing) {
    const video = document.getElementById('video');
    if (video.readyState >= video.HAVE_ENOUGH_DATA) {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (vw > 0 && vh > 0) {
        const canvas = document.getElementById('canvas');
        canvas.width = vw; canvas.height = vh;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, vw, vh);
        const imageData = ctx.getImageData(0, 0, vw, vh);

        // Try normal orientation first, then inverted (handles some print styles)
        const code = jsQR(imageData.data, vw, vh, { inversionAttempts: 'dontInvert' })
                  || jsQR(imageData.data, vw, vh, { inversionAttempts: 'onlyInvert' });

        if (code) {
          // Await fully — no next frame until DB write is complete
          await onCode(code.data);
        }
      }
    }
  }

  rafId = requestAnimationFrame(() => tick());
}

// ══ Handle decoded QR value ══════════════════════════════════════════════════
// FIX [HIGH-1,2]: isProcessing set true for full duration of async work.
async function onCode(raw) {
  const now = Date.now();
  // Cooldown — prevent double-saving the same QR if user holds camera still
  if (raw === lastCode && (now - lastAt) < COOLDOWN) return;
  lastCode = raw;
  lastAt   = now;

  isProcessing = true;
  try {
    dbg('Read: ' + raw.slice(0, 55) + (raw.length > 55 ? '…' : ''));

    const record = tryParse(raw);
    if (!record) {
      showToast('QR read but not exam JSON', 'err');
      dbg('Not exam JSON: ' + raw.slice(0, 60));
      return;
    }

    // Duplicate SID check — skip if this SID already exists in pool
    if (record.sid && pool.some(r => r.sid === record.sid)) {
      showToast('⚠ Already saved: ' + record.name, 'inf');
      dbg('Duplicate SID skipped: ' + record.sid);
      return;
    }

    await dbAdd(record);
    pool = await dbAll();
    renderPool();
    flashScreen();
    if (navigator.vibrate) navigator.vibrate([80, 30, 50]);
    showToast('✓ Saved: ' + record.name, 'ok');
    dbg('✓ ' + record.name);
  } finally {
    isProcessing = false;
  }
}

// ══ Photo upload ══════════════════════════════════════════════════════════════
function onFileSelect(e) {
  const file = e.target.files[0];
  if (file) processImage(file);
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('fileDrop').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) processImage(file);
}

function processImage(file) {
  if (typeof jsQR !== 'function') { showToast('jsQR not loaded — reload page', 'err'); return; }

  const url = URL.createObjectURL(file);
  const img = document.getElementById('imgPreview');
  img.style.display = 'block';
  img.src = url;
  showToast('Reading QR from image…', 'inf');

  // FIX [LOW-6]: onerror handler revokes URL and shows message
  img.onerror = () => {
    URL.revokeObjectURL(url);
    img.style.display = 'none';
    document.getElementById('fileInput').value = '';
    showToast('Could not load image file', 'err');
  };

  // FIX [MEDIUM-3]: img.onload is async and awaits onCode()
  img.onload = async () => {
    const canvas = document.getElementById('photoCanvas');
    // Try multiple scales — dense QR codes sometimes need upscaling to decode
    const scales = [1, 1.5, 2, 0.75];
    let found = null;

    for (const scale of scales) {
      const w = Math.round(img.naturalWidth  * scale);
      const h = Math.round(img.naturalHeight * scale);
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const imageData = ctx.getImageData(0, 0, w, h);

      found = jsQR(imageData.data, w, h, { inversionAttempts: 'dontInvert' })
           || jsQR(imageData.data, w, h, { inversionAttempts: 'onlyInvert' });
      if (found) break;
    }

    URL.revokeObjectURL(url);

    if (found) {
      await onCode(found.data);
    } else {
      showToast('No QR found in image — try a clearer/closer photo', 'err');
    }

    setTimeout(() => {
      img.style.display = 'none';
      document.getElementById('fileInput').value = '';
    }, 2000);
  };
}

// ══ Paste ════════════════════════════════════════════════════════════════════
async function parsePaste() {
  const raw = document.getElementById('pasteBox').value.trim();
  if (!raw) { showToast('Nothing to parse', 'err'); return; }

  const found = [], errCount = [0];
  let depth = 0, start = -1;
  for (let i = 0; i < raw.length; i++) {
    if (raw[i] === '{') { if (depth === 0) start = i; depth++; }
    else if (raw[i] === '}') {
      depth--;
      if (depth === 0 && start !== -1) {
        try { found.push(JSON.parse(raw.slice(start, i + 1))); }
        catch(e) { errCount[0]++; }
        start = -1;
      }
    }
  }

  if (!found.length) { showToast('No valid JSON found', 'err'); return; }

  const records = found.map(mapObj).filter(r => r.name || r.seatNo);
  if (!records.length) { showToast('JSON found but no exam fields (Name/SeatNo missing)', 'err'); return; }

  try {
    await dbMany(records);
    pool = await dbAll();
    renderPool();
    document.getElementById('pasteBox').value = '';
    showToast('Saved ' + records.length + ' record(s) · total: ' + pool.length, 'ok');
  } catch(e) {
    showToast('Save failed — IndexedDB unavailable in this environment', 'err');
  }
}

// ══ Pure functions ════════════════════════════════════════════════════════════
function tryParse(text) {
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try {
    const o = JSON.parse(m[0]);
    const r = mapObj(o);
    return (r.name || r.seatNo) ? r : null;
  } catch(e) { return null; }
}

function mapObj(o) {
  return {
    schoolIndex: trim(o.SchoolIndexNo),
    seatNo:      trim(o.SeatNo),
    sid:         trim(o.SID),
    name:        trim(o.Name),
  };
}

function trim(v)  { return (v || '').toString().trim(); }

function esc(s)   { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function csvField(v) {
  v = (v || '').toString();
  return /[,"\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
}

function buildCSV(rows) {
  return [
    'School Index,Seat No,SID No,Name',
    ...rows.map(r => [r.schoolIndex, r.seatNo, r.sid, r.name].map(csvField).join(','))
  ].join('\n');
}

// FIX [LOW-7]: use local date so filename matches user's timezone
function localDateStr() {
  const d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

function flashScreen() {
  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 180);
}

// ══ Pool actions ══════════════════════════════════════════════════════════════
async function delRow(id) {
  // FIX [LOW-5]: parseInt guard on id before passing to IDB
  await dbDel(parseInt(id, 10));
  pool = await dbAll();
  renderPool();
}

async function clearPool() {
  if (!pool.length) return;
  // confirm() is blocked in sandboxed iframes — use double-tap pattern instead
  if (!_clearArmed) {
    _clearArmed = true;
    showToast('Tap Clear All again to confirm — deletes all ' + pool.length + ' records', 'err');
    setTimeout(() => { _clearArmed = false; }, 4000);
    return;
  }
  _clearArmed = false;
  await dbClr();
  pool = [];
  renderPool();
  showToast('Pool cleared', 'inf');
}
let _clearArmed = false;

// ══ Export ════════════════════════════════════════════════════════════════════
function exportCSV() {
  if (!pool.length) { showToast('Nothing to export', 'err'); return; }
  const csv  = buildCSV(pool);
  const blob = new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', 'exam_' + localDateStr() + '.csv');   // FIX [LOW-7]
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Exported ' + pool.length + ' record(s)', 'ok');
}

// ══ Render ════════════════════════════════════════════════════════════════════
function renderPool() {
  const label = pool.length + ' record' + (pool.length !== 1 ? 's' : '');
  document.getElementById('poolBadge').textContent    = label;
  document.getElementById('camPoolCount').textContent = pool.length + ' saved';

  if (!pool.length) {
    document.getElementById('poolBody').innerHTML =
      '<tr><td colspan="6"><div class="empty">// pool is empty<br>scan · photo · paste</div></td></tr>';
    document.getElementById('csvBox').textContent = '—';
    return;
  }

  // FIX [LOW-5]: parseInt in onclick attr — redundant but explicit
  document.getElementById('poolBody').innerHTML = pool.map((r, i) => `
    <tr>
      <td style="color:var(--muted)">${i + 1}</td>
      <td>${esc(r.schoolIndex)}</td>
      <td>${esc(r.seatNo)}</td>
      <td>${esc(r.sid)}</td>
      <td>${esc(r.name)}</td>
      <td><button class="xbtn" onclick="delRow(${parseInt(r.id, 10)})">&#x2715;</button></td>
    </tr>`).join('');

  document.getElementById('csvBox').textContent = buildCSV(pool);
}

// ══ Toast + debug ═════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 4500);
}

function dbg(msg) {
  document.getElementById('dbg').textContent = '// ' + msg;
}
</script>
